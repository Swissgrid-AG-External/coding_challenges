[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # Pyflakes
    "I",    # isort
    "C",    # flake8-comprehensions
    "B",    # flake8-bugbear
    "S",    # flake8-bandit (security)
]
[tool.ruff.lint.isort]
known-first-party = ["function_app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
